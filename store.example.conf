# kv-store config example
# Usage: cp store.example.conf store.conf
# edit store.conf as needed
# ./kv-store /path/to/store.conf

#port on which the store will run
PORT=6948

# format: DB <maxCapacity> <ttl> <evictInterval>
# each DB line creates one store instance (0-indexed)                 
DB maxCapacity=1000 ttl=60 evictInterval=1000
DB maxCapacity=500 ttl=150 evictInterval=80
DB maxCapacity=300 ttl=60 evictInterval=80